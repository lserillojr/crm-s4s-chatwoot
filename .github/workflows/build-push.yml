# Build + push da imagem custom do Chatwoot pro GHCR.
# Roda em push na main (quando Dockerfile/patches mudam) ou manualmente (dispatch).
name: build-push

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - patches/**
      - .github/workflows/build-push.yml
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lserillojr/crm-s4s-chatwoot:v4.13.0
            ghcr.io/lserillojr/crm-s4s-chatwoot:v4.13.0-sso2
            ghcr.io/lserillojr/crm-s4s-chatwoot:latest
